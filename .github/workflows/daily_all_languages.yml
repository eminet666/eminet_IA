name: Daily Language Agents

on:
  schedule:
    - cron: "0 5 * * *"   # 6h Paris (UTC+1)
  workflow_dispatch:
    inputs:
      language:
        description: "Langue à générer (greek / italian / spanish / english / all)"
        required: true
        default: "all"

jobs:
  run-agent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [greek, italian, spanish, english] # language: [greek, italian, spanish, english]
      fail-fast: false
      max-parallel: 2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libfontconfig1

      - name: Install Python dependencies
        run: pip install mistralai python-dotenv edge-tts pydub weasyprint

      - name: Run agent — ${{ matrix.language }}
        if: >
          github.event_name == 'schedule' ||
          github.event.inputs.language == 'all' ||
          github.event.inputs.language == matrix.language
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
        run: python IA_agent/allAgent/core/main.py ${{ matrix.language }} 